name: Bug report
description: Report a Fabricator bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include commands, plugin version, installed cache path, and chat evidence if relevant.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation already tried
      description: List any tests, validators, or runtime checks you ran.
